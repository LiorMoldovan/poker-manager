<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <link rel="icon" type="image/svg+xml" href="/poker.svg" />
    <!-- iOS Safari uses apple-touch-icon for the home-screen icon when
         installed via "Add to Home Screen". Without it iOS shows a
         miniaturized screenshot of the page, which looks broken. SVG
         is accepted by iOS 16+; older iOS falls back to a default
         rounded-square. -->
    <link rel="apple-touch-icon" href="/poker.svg" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a0f" />
    <!-- iOS PWA: declare standalone capability and tell iOS to render
         under the status bar (matching `display: standalone` from
         manifest.json on Chromium browsers). `apple-mobile-web-app-title`
         is the home-screen label for iOS — without it iOS uses the
         <title> which on this site is "Poker Game Manager" (long). -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Poker" />
    <!-- Microsoft Edge / Chromium signal that this is a real installable
         web app. Browsers ignore unknown meta tags so this is harmless
         on others. Helps Edge mobile resolve "Install this site as an
         app" vs "Add as bookmark" when the user taps the menu install
         option — without it some Edge builds default to the bookmark
         path, which opens the launcher icon in the regular browser
         instead of standalone. -->
    <meta name="application-name" content="Poker Manager" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>Poker Game Manager</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Heebo:wght@500;600;700;800;900&display=swap" rel="stylesheet">
    <script>
      // Bootstrap watchdog — detects "blank screen" boot failures and
      // self-heals. The most common failure mode is a stale PWA shell:
      // an old `index.html` is served from somewhere on disk (browser
      // HTTP cache, OS-level PWA cache, or Edge's standalone-mode app
      // shell) that references hashed JS chunks (`/assets/main-XXXX.js`)
      // that no longer exist on the live deploy because Vite emitted a
      // new hash on the latest build. The script tag 404s, React never
      // mounts, and the user sees a blank page — with no in-app
      // recovery path because ErrorBoundary only catches errors from
      // INSIDE React, not module-load failures that happen before
      // React boots.
      //
      // Three recovery triggers:
      //   1. `error` event on a `<script>` tag — fires synchronously
      //      when a chunk 404s or fails to parse. We catch on
      //      `window.addEventListener('error', ..., true)` (capture
      //      phase) so it sees errors that bubble up from script
      //      loading.
      //   2. Watchdog timer — if `<div id="root">` is still empty
      //      after 6 seconds, assume boot failed silently. 6s is
      //      generous for typical first paints (under 2s) but short
      //      enough that the user isn't stuck staring at a blank
      //      page for ages.
      //   3. Loading overlay at 2.5s — visible feedback that the
      //      app is alive and working on it, while we wait for the
      //      hard watchdog to decide.
      //
      // Recovery itself unregisters every service worker, clears
      // every CacheStorage entry, then hard-reloads with a cache-bust
      // query so the browser is forced past the HTTP cache layer too.
      // Up to 3 attempts per session (counter in sessionStorage). After
      // 3 failed attempts the user sees a final "שגיאה" UI with a
      // manual retry button — better than letting them stare at a
      // blank screen forever.
      (function () {
        var RECOVERY_KEY = '__poker_pwa_recovery_attempts';
        var WATCHDOG_MS = 6000;
        var STATUS_OVERLAY_MS = 2500;
        var MAX_ATTEMPTS = 3;

        function getAttempts() {
          try { return parseInt(sessionStorage.getItem(RECOVERY_KEY) || '0', 10) || 0; }
          catch (_) { return 0; }
        }
        function setAttempts(n) {
          try { sessionStorage.setItem(RECOVERY_KEY, String(n)); } catch (_) {}
        }

        function showLoadingOverlay() {
          if (!document.body) return;
          if (document.getElementById('__pwa_loading_overlay')) return;
          var root = document.getElementById('root');
          if (!root || root.children.length > 0) return;
          var overlay = document.createElement('div');
          overlay.id = '__pwa_loading_overlay';
          overlay.style.cssText = 'position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0a0a0f;color:#fff;font-family:system-ui,-apple-system,sans-serif;z-index:99999;direction:rtl;';
          overlay.innerHTML = '<div style="font-size:48px;margin-bottom:12px;">🃏</div><div style="font-size:14px;opacity:0.7;">טוען…</div>';
          document.body.appendChild(overlay);
        }

        function showFinalFailure() {
          if (!document.body) return;
          var existing = document.getElementById('__pwa_loading_overlay');
          if (existing) existing.remove();
          var root = document.getElementById('root');
          if (!root) return;
          root.innerHTML = '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;font-family:system-ui,-apple-system,sans-serif;color:#fff;background:#0a0a0f;text-align:center;direction:rtl;">' +
            '<div style="font-size:56px;margin-bottom:16px;">🃏</div>' +
            '<div style="font-size:18px;font-weight:600;margin-bottom:8px;">הטעינה נתקעה</div>' +
            '<div style="font-size:13px;opacity:0.7;margin-bottom:20px;max-width:320px;line-height:1.5;">ניסינו לתקן זאת אוטומטית מספר פעמים. נסו לפתוח שוב את האפליקציה או לחצו כאן.</div>' +
            '<button id="__pwa_retry" style="background:#3b82f6;color:#fff;border:none;border-radius:8px;padding:12px 24px;font-size:14px;font-weight:600;cursor:pointer;">נסה שוב</button>' +
          '</div>';
          var btn = document.getElementById('__pwa_retry');
          if (btn) {
            btn.addEventListener('click', function () {
              try { sessionStorage.removeItem(RECOVERY_KEY); } catch (_) {}
              recover('manual-retry');
            });
          }
        }

        function recover(reason) {
          var attempts = getAttempts();
          if (attempts >= MAX_ATTEMPTS) {
            console.warn('PWA boot watchdog: max attempts (' + MAX_ATTEMPTS + ') reached; showing manual retry UI.', reason);
            showFinalFailure();
            return;
          }
          setAttempts(attempts + 1);
          console.warn('PWA boot watchdog: recovery attempt ' + (attempts + 1) + '/' + MAX_ATTEMPTS + ' due to:', reason);

          var clearOps = [];

          if ('serviceWorker' in navigator) {
            clearOps.push(
              navigator.serviceWorker.getRegistrations().then(function (regs) {
                return Promise.all(regs.map(function (r) { return r.unregister(); }));
              }).catch(function () {})
            );
          }
          if (typeof caches !== 'undefined' && caches.keys) {
            clearOps.push(
              caches.keys().then(function (names) {
                return Promise.all(names.map(function (n) { return caches.delete(n); }));
              }).catch(function () {})
            );
          }

          Promise.all(clearOps).catch(function () {}).then(function () {
            // Cache-bust the URL so the browser is forced past any
            // HTTP-layer cache too — `?_pwa=<ts>` is benign for the
            // SPA router (it ignores unknown params). We deliberately
            // keep the path so a user landing via a deep link
            // (e.g. /p/<slug>) returns to the same page after recovery.
            var url = new URL(window.location.href);
            url.searchParams.set('_pwa', Date.now().toString());
            window.location.replace(url.toString());
          });
        }

        // Trigger 1: capture-phase error listener catches `<script>`
        // load failures (404 / parse error on a Vite chunk).
        window.addEventListener('error', function (ev) {
          var target = ev.target;
          if (target && (target.tagName === 'SCRIPT' || target.tagName === 'LINK')) {
            recover('asset-load-error: ' + (target.src || target.href || target.tagName));
          }
        }, true);

        // Trigger 3: soft loading overlay at 2.5s — visible feedback
        // that something's happening. Cleared from main.tsx as soon
        // as React commits its first render.
        window.__pokerLoadingOverlayTimer = setTimeout(showLoadingOverlay, STATUS_OVERLAY_MS);

        // Trigger 2: hard watchdog at 6s. If the root is still empty,
        // the React tree never mounted. Cleared from main.tsx as soon
        // as React commits its first render.
        window.__pokerBootWatchdog = setTimeout(function () {
          var root = document.getElementById('root');
          if (root && root.children.length === 0) {
            recover('watchdog-timeout');
          }
        }, WATCHDOG_MS);

        // Expose a manual recovery hook for support / debugging.
        window.__pokerPwaRecover = function () {
          try { sessionStorage.removeItem(RECOVERY_KEY); } catch (_) {}
          recover('manual');
        };
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
